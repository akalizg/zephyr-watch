server:
  port: ${ZEPHYR_API_PORT:8080}
  error:
    include-message: always

spring:
  datasource:
    url: ${ZEPHYR_MYSQL_URL:jdbc:mysql://127.0.0.1:3306/zephyr_watch?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${ZEPHYR_MYSQL_USER:root}
    password: ${ZEPHYR_MYSQL_PASSWORD:comeonYZ6}
    driver-class-name: com.mysql.jdbc.Driver
  redis:
    host: ${ZEPHYR_REDIS_HOST:127.0.0.1}
    port: ${ZEPHYR_REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${ZEPHYR_KAFKA_BOOTSTRAP_SERVERS:192.168.88.161:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

# Webhook HTTP 行为（Flink WebhookAlertSink 与 WebhookConfigController 均读取下列环境变量，非 Spring 属性）:
# ZEPHYR_WEBHOOK_CONNECT_TIMEOUT_MS  默认 5000
# ZEPHYR_WEBHOOK_READ_TIMEOUT_MS     默认 5000
# ZEPHYR_WEBHOOK_MAX_ATTEMPTS        默认 2
# 仅当使用 ZEPHYR_ALERT_WEBHOOK_URL 且机器人开启加签时：ZEPHYR_ALERT_WEBHOOK_SIGN_SECRET
