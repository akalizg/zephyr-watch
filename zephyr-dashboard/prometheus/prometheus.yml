global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "zephyr-api"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["host.docker.internal:8080"]

  - job_name: "flink"
    static_configs:
      - targets: ["host.docker.internal:9249"]

  - job_name: "kafka"
    static_configs:
      - targets: ["host.docker.internal:9308"]

  - job_name: "node"
    static_configs:
      - targets: ["host.docker.internal:9100"]
